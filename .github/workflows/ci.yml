# Flujo de integración continua ejecutado en cada Pull Request.
#
# Jobs:
#   1. pre-commit          – ejecuta todos los hooks de pre-commit sobre el código
#                           modificado en la PR.
#   2. python-tests        – tests del código de bootstrap con pytest.
#   3. python-tests-code   – tests del código Python de la aplicación con pytest.
#   4. python-sast         – análisis estático de seguridad con Bandit sobre
#                           bootstrap/ y code/python/.
#
# Las comprobaciones de IaC (terraform fmt, Checkov) se realizan a través de
# pre-commit, garantizando que se aplican tanto en local como en CI.

name: CI – Pull Request

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  # --------------------------------------------------------------------------
  # 1. Pre-commit
  # --------------------------------------------------------------------------
  pre-commit:
    name: pre-commit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Instalar uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configurar Terraform (requerido por hooks de terraform)
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"

      - name: Ejecutar pre-commit sobre todos los ficheros modificados
        uses: pre-commit/action@v3.0.1

  # --------------------------------------------------------------------------
  # 2. Tests de Python – bootstrap
  # --------------------------------------------------------------------------
  python-tests:
    name: Tests de Python – bootstrap
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bootstrap/
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Instalar uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Instalar dependencias (incluyendo dev)
        run: uv sync --dev

      - name: Ejecutar tests con pytest
        run: uv run pytest --tb=short -q

  # --------------------------------------------------------------------------
  # 3. Tests de Python – código de la aplicación
  # --------------------------------------------------------------------------
  python-tests-code:
    name: Tests de Python – aplicación
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: code/python/
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Instalar uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Instalar dependencias (incluyendo dev)
        run: uv sync --dev

      - name: Ejecutar tests con pytest
        run: uv run pytest --tb=short -q

  # --------------------------------------------------------------------------
  # 4. Análisis estático de seguridad – Bandit
  # --------------------------------------------------------------------------
  python-sast:
    name: SAST – Bandit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Instalar uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Instalar dependencias del bootstrap (contiene Bandit)
        working-directory: bootstrap/
        run: uv sync --dev

      - name: Analizar bootstrap/ con Bandit
        # Se listan los ficheros fuente explícitamente para evitar
        # que Bandit analice las librerías del entorno virtual
        working-directory: bootstrap/
        run: uv run bandit config.py backend.py iam.py oidc.py bootstrap.py -ll -ii

      - name: Analizar code/python/ con Bandit
        # find excluye cualquier ruta que contenga /.venv/ para garantizar
        # que sólo se analizan ficheros fuente propios del proyecto
        working-directory: bootstrap/
        run: |
          find ../code/python -name "*.py" -not -path "*/.venv/*" -print0 | \
            xargs -0 uv run bandit -ll -ii
